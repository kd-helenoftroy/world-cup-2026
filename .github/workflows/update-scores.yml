name: Update scores

on:
  schedule:
    # Every 6 minutes between 3 PM and 3 AM UTC (covers all WC2026 kickoffs + finishes)
    # Earliest kickoff is noon ET = 4 PM UTC; latest finish ~midnight ET = 4 AM UTC.
    # We bracket generously: 15:00–03:00 UTC. GitHub cron is UTC-only.
    - cron: "*/6 15-23 * * *"   # 3 PM – 11:54 PM UTC
    - cron: "*/6 0-3  * * *"    # midnight – 3:54 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest scores
        run: node scripts/update-scores.mjs

      - name: Commit & push if anything changed
        run: |
          git config user.name "wc26-score-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          if git diff --cached --quiet; then
            echo "No new scores this run."
          else
            git commit -m "Update World Cup scores"
            git push
          fi
