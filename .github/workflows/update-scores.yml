name: Refresh match previews

on:
  schedule:
    # Run once daily at 6 AM UTC to keep upcoming match previews fresh
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  previews:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate match previews
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-previews.mjs

      - name: Commit previews if changed
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "wc26-score-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/kd-helenoftroy/world-cup-2026.git
          git add previews.json
          if git diff --cached --quiet; then
            echo "No new previews."
          else
            git pull --no-rebase
            git commit -m "Refresh match previews"
            git push
          fi
