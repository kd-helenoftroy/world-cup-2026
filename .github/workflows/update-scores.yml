name: Update scores

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest final scores
        run: node scripts/update-scores.mjs

      - name: Commit & push if anything changed
        run: |
          git config user.name "wc26-score-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          if git diff --cached --quiet; then
            echo "No new scores this run."
          else
            git commit -m "Update World Cup scores"
            git push
          fi
