name: Update scores

on:
  schedule:
    # Every 5 minutes between 3 PM and 3 AM UTC (covers all WC2026 kickoffs + finishes)
    # Earliest kickoff is noon ET = 4 PM UTC; latest finish ~midnight ET = 4 AM UTC.
    # We bracket generously: 15:00–03:00 UTC. GitHub cron is UTC-only.
    # Note: GitHub Actions enforces a minimum interval of 5 minutes for scheduled workflows.
    - cron: "*/5 15-23 * * *"   # 3 PM – 11:55 PM UTC
    - cron: "*/5 0-3  * * *"    # midnight – 3:55 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: score-sync
      cancel-in-progress: false
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync to latest origin and fetch scores
        run: |
          git fetch origin
          git reset --hard origin/main
          node scripts/update-scores.mjs

      - name: Generate match previews
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-previews.mjs

      - name: Commit & push if anything changed
        id: push
        run: |
          set -e
          git config user.name "wc26-score-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json previews.json
          if git diff --cached --quiet; then
            echo "No new scores this run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update World Cup scores"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel redeploy
        if: steps.push.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -X POST "$HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK secret not set, skipping."
          fi
