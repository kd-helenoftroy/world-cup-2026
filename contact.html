<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact: WC26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <style>
    :root {
      --bg: #F0F4FA;
      --ink: #020F2A;
      --ink-soft: rgba(2, 15, 42, 0.72);
      --pitch: #0A84FF;
      --coral: #F43056;
      --line: rgba(2, 15, 42, 0.09);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Barlow", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 90% 35% at 50% -4%, rgba(10, 132, 255, 0.07), transparent 55%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 36px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(2, 15, 42, 0.08);
      border: 1.5px solid var(--line);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 28px;
      font-size: 13px;
      font-weight: 700;
      color: var(--pitch);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back-link:hover { text-decoration: underline; }
    h1 {
      font-family: "Anton", sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .divider {
      height: 3px;
      width: 40px;
      background: linear-gradient(to right, var(--pitch), var(--coral));
      border-radius: 2px;
      margin-bottom: 24px;
    }
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .contact-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .contact-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .contact-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .contact-value a {
      color: var(--ink);
      text-decoration: none;
    }
    .contact-value a:hover { color: var(--pitch); text-decoration: underline; }
    .bio { margin-bottom: 24px; font-family: "IBM Plex Mono", monospace; font-size: 11.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-soft); line-height: 1.8; }
    .bottom-row { display: flex; gap: 24px; align-items: stretch; }
    .contact-list { flex: 1; gap: 0; justify-content: space-between; }
    .contact-label { font-size: 9px; }
    .contact-value { font-size: 12px; }
    .bio-photo { width: 110px; height: auto; object-fit: cover; object-position: top; border-radius: 8px; flex-shrink: 0; }
    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .bottom-row { gap: 14px; }
      .contact-label { font-size: 9px; }
      .contact-value { font-size: 12px; }
      .bio-photo { width: 90px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back-link" href="index.html">← Back to WC26</a>
    <h1>Kajal Dayal</h1>
    <div class="divider"></div>
    <p class="bio">Full time sports &amp; fitness enthusiast, part time tech enthusiast - based in San Francisco. Reach out &amp; follow along xx</p>
    <div class="bottom-row">
      <div class="contact-list">
        <div class="contact-row">
          <span class="contact-label">Email</span>
          <span class="contact-value"><a href="mailto:dayal.kajal@gmail.com">dayal.kajal@gmail.com</a></span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Instagram</span>
          <span class="contact-value"><a href="https://instagram.com/kajaldayal" target="_blank" rel="noopener">@kajaldayal</a></span>
        </div>
        <div class="contact-row">
          <span class="contact-label">X</span>
          <span class="contact-value"><a href="https://x.com/kajaldayal" target="_blank" rel="noopener">@kajaldayal</a></span>
        </div>
        <div class="contact-row">
          <span class="contact-label">LinkedIn</span>
          <span class="contact-value"><a href="https://www.linkedin.com/in/kajal-dayal" target="_blank" rel="noopener">Kajal Dayal</a></span>
        </div>
        <div class="contact-row">
          <span class="contact-label">View Source</span>
          <span class="contact-value"><a href="https://github.com/kd-helenoftroy/world-cup-2026" target="_blank" rel="noopener">GitHub</a></span>
        </div>
      </div>
      <img class="bio-photo" src="kajal.jpg" alt="Kajal Dayal">
    </div>
  </div>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
